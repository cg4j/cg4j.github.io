<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient for flame text -->
    <linearGradient id="flameGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#9aabbf;stop-opacity:0.95"/>
      <stop offset="50%" style="stop-color:#7a8a9a;stop-opacity:0.75"/>
      <stop offset="100%" style="stop-color:#5a6a7a;stop-opacity:0.45"/>
    </linearGradient>
    
    <!-- Glow filter for text -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle (optional, subtle) -->
  <circle cx="256" cy="256" r="250" fill="#1a1a2e" opacity="0.05"/>
  
  <!-- Rising heat lines from cup to text -->
  <path d="M200 148 Q195 130 205 115" fill="none" stroke="#7a8a9a" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <path d="M224 148 Q224 128 224 112" fill="none" stroke="#8899aa" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M248 148 Q253 130 243 115" fill="none" stroke="#7a8a9a" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Stylized CG4j flame text - moved closer and centered -->
  <!-- Shadow/depth layer -->
  <text x="226" y="100" 
        font-family="Georgia, serif" 
        font-size="52" 
        font-weight="bold" 
        font-style="italic"
        fill="#4a5a6a" 
        text-anchor="middle"
        opacity="0.3">CG4j</text>
  
  <!-- Main text with flame styling -->
  <text x="224" y="98" 
        font-family="Georgia, serif" 
        font-size="52" 
        font-weight="bold" 
        font-style="italic"
        fill="url(#flameGradient)" 
        text-anchor="middle"
        filter="url(#glow)">CG4j</text>
  
  <!-- Steam wisps around text -->
  <path d="M148 95 Q140 75 150 55" fill="none" stroke="#8899aa" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M300 95 Q310 75 300 55" fill="none" stroke="#8899aa" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Small flame accents at bottom of letters -->
  <ellipse cx="185" cy="108" rx="6" ry="10" fill="#8899aa" opacity="0.25"/>
  <ellipse cx="224" cy="110" rx="5" ry="8" fill="#9aabbf" opacity="0.2"/>
  <ellipse cx="263" cy="108" rx="6" ry="10" fill="#8899aa" opacity="0.25"/>
  
  <!-- Coffee cup body - dark/semi-black -->
  <path d="M96 160 L96 384 Q96 432 144 432 L304 432 Q352 432 352 384 L352 160 Z" fill="#1a1a1a"/>
  
  <!-- Cup highlight/shine -->
  <path d="M112 176 L112 368 Q112 400 140 400" fill="none" stroke="#2d2d2d" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Cup rim -->
  <ellipse cx="224" cy="160" rx="128" ry="32" fill="#2d2d2d"/>
  
  <!-- Cup rim inner -->
  <ellipse cx="224" cy="160" rx="112" ry="24" fill="#0f0f0f"/>
  
  <!-- Coffee surface -->
  <ellipse cx="224" cy="168" rx="104" ry="20" fill="#6f4e37"/>
  
  <!-- Coffee surface highlight -->
  <ellipse cx="200" cy="164" rx="40" ry="8" fill="#8b6914" opacity="0.3"/>
  
  <!-- Handle - dark -->
  <path d="M352 208 Q432 208 432 288 Q432 368 352 368" fill="none" stroke="#1a1a1a" stroke-width="32" stroke-linecap="round"/>
  <path d="M352 224 Q408 224 408 288 Q408 352 352 352" fill="none" stroke="#0f0f0f" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Node A (top left) -->
  <circle cx="160" cy="256" r="24" fill="#f8981d"/>
  <circle cx="160" cy="256" r="16" fill="#ffc107" opacity="0.5"/>
  <text x="160" y="262" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">A</text>
  
  <!-- Node B (top right) -->
  <circle cx="288" cy="256" r="24" fill="#f8981d"/>
  <circle cx="288" cy="256" r="16" fill="#ffc107" opacity="0.5"/>
  <text x="288" y="262" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">B</text>
  
  <!-- Node C (middle) -->
  <circle cx="224" cy="304" r="24" fill="#f8981d"/>
  <circle cx="224" cy="304" r="16" fill="#ffc107" opacity="0.5"/>
  <text x="224" y="310" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">C</text>
  
  <!-- Node D (bottom) -->
  <circle cx="224" cy="368" r="20" fill="#f8981d"/>
  <circle cx="224" cy="368" r="12" fill="#ffc107" opacity="0.5"/>
  <text x="224" y="374" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a" text-anchor="middle">D</text>
  
  <!-- Call graph edges -->
  <line x1="160" y1="280" x2="200" y2="296" stroke="#f8981d" stroke-width="6" stroke-linecap="round"/>
  <line x1="288" y1="280" x2="248" y2="296" stroke="#f8981d" stroke-width="6" stroke-linecap="round"/>
  <line x1="224" y1="328" x2="224" y2="348" stroke="#f8981d" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Arrow heads -->
  <polygon points="204,292 188,284 192,300" fill="#f8981d"/>
  <polygon points="244,292 260,284 256,300" fill="#f8981d"/>
  <polygon points="224,352 212,336 236,336" fill="#f8981d"/>
  
  <!-- Subtle decoration on cup base -->
  <path d="M176 400 Q224 416 272 400" fill="none" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
</svg>
